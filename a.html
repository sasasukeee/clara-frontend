<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login Screen</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased selection:bg-primary/30 selection:text-primary">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <div
            class="flex items-center px-4 py-4 justify-between sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
            <div
                class="flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 cursor-pointer transition-colors">
                <span class="material-symbols-outlined text-slate-900 dark:text-white text-[24px]">arrow_back</span>
            </div>
            <div class="size-10"></div>
        </div>
        <div class="flex flex-1 flex-col px-6 max-w-[480px] mx-auto w-full pb-10">
            <div class="flex justify-center py-6">
                <div
                    class="size-16 rounded-xl bg-gradient-to-tr from-primary to-blue-400 flex items-center justify-center shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-white text-[32px]">lock</span>
                </div>
            </div>
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold leading-tight mb-2 tracking-tight text-slate-900 dark:text-white">Welcome
                    back</h1>
                <p class="text-slate-500 dark:text-slate-400 text-base font-normal">Please enter your details to sign
                    in.</p>
            </div>
            <div class="flex flex-col gap-5">
                <div class="relative w-full">
                    <input
                        class="peer block h-14 w-full rounded-lg border border-slate-200 dark:border-[#324d67] bg-transparent px-4 text-base text-slate-900 dark:text-white focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder-transparent"
                        id="email" placeholder="Email" type="email" />
                    <label
                        class="absolute left-2 top-0 z-10 -translate-y-1/2 px-2 text-xs text-primary duration-300 bg-background-light dark:bg-background-dark peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:text-base peer-placeholder-shown:text-slate-400 peer-placeholder-shown:bg-transparent peer-focus:top-0 peer-focus:-translate-y-1/2 peer-focus:text-xs peer-focus:text-primary peer-focus:bg-background-light dark:text-[#92adc9] dark:peer-focus:text-primary dark:peer-focus:bg-background-dark pointer-events-none"
                        for="email">
                        Email
                    </label>
                    <div
                        class="absolute right-0 top-0 bottom-0 flex items-center justify-center pr-4 pointer-events-none">
                        <span class="material-symbols-outlined text-slate-400 dark:text-[#92adc9]">mail</span>
                    </div>
                </div>
                <div class="relative w-full">
                    <input
                        class="peer block h-14 w-full rounded-lg border border-slate-200 dark:border-[#324d67] bg-transparent px-4 text-base text-slate-900 dark:text-white focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder-transparent pr-12"
                        id="password" placeholder="Password" type="password" />
                    <label
                        class="absolute left-2 top-0 z-10 -translate-y-1/2 px-2 text-xs text-primary duration-300 bg-background-light dark:bg-background-dark peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:text-base peer-placeholder-shown:text-slate-400 peer-placeholder-shown:bg-transparent peer-focus:top-0 peer-focus:-translate-y-1/2 peer-focus:text-xs peer-focus:text-primary peer-focus:bg-background-light dark:text-[#92adc9] dark:peer-focus:text-primary dark:peer-focus:bg-background-dark pointer-events-none"
                        for="password">
                        Password
                    </label>
                    <div
                        class="absolute right-0 top-0 bottom-0 flex items-center justify-center pr-4 cursor-pointer hover:opacity-80">
                        <span class="material-symbols-outlined text-slate-400 dark:text-[#92adc9]">visibility_off</span>
                    </div>
                </div>
                <div class="flex justify-end">
                    <a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot
                        Password?</a>
                </div>
                <button
                    class="w-full h-12 bg-primary hover:bg-blue-600 text-white font-semibold rounded-lg shadow-lg shadow-blue-500/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Log In
                </button>
            </div>
            <div class="relative py-8">
                <div aria-hidden="true" class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
                </div>
                <div class="relative flex justify-center text-sm font-medium leading-6">
                    <span class="bg-background-light dark:bg-background-dark px-4 text-slate-500">Or continue
                        with</span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button
                    class="flex items-center justify-center gap-3 h-12 rounded-lg bg-white dark:bg-[#1c2936] border border-slate-200 dark:border-[#324d67] hover:bg-slate-50 dark:hover:bg-[#253646] transition-colors group">
                    <div aria-hidden="true"
                        class="size-5 rounded-full bg-white flex items-center justify-center overflow-hidden">
                        <div class="w-full h-full relative bg-white">
                            <div class="absolute inset-0 border-2 border-slate-600 rounded-full dark:border-white">
                            </div>
                            <span
                                class="absolute inset-0 flex items-center justify-center font-bold text-xs text-slate-700 dark:text-white">G</span>
                        </div>
                    </div>
                    <span
                        class="text-sm font-medium text-slate-700 dark:text-white group-hover:text-slate-900 dark:group-hover:text-white">Google</span>
                </button>
                <button
                    class="flex items-center justify-center gap-3 h-12 rounded-lg bg-slate-900 dark:bg-white border border-slate-900 dark:border-white hover:bg-slate-800 dark:hover:bg-slate-100 transition-colors group">
                    <span class="material-symbols-outlined text-[20px] text-white dark:text-black">nutrition</span>
                    <span class="text-sm font-medium text-white dark:text-black">Apple</span>
                </button>
            </div>
            <div class="flex-1"></div>
            <div class="text-center py-4">
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    Don't have an account?
                    <a class="font-semibold text-primary hover:text-primary/80 transition-colors ml-1" href="#">Sign
                        up</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
